name: Build Linux Release

on:
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*'  # Trigger on version tags

jobs:
  build-linux:
    runs-on: ubuntu-22.04  # Pin to match seed-node Ubuntu version (glibc parity)

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive  # Pulls depends/randomx, depends/chiavdf, depends/dilithium

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libleveldb-dev \
          libsnappy-dev \
          libssl-dev \
          libminiupnpc-dev \
          libgmp-dev

    - name: Build RandomX
      run: |
        cd depends/randomx
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        ls -lh librandomx.a

    - name: Build Dilithium library
      run: |
        if [ ! -f depends/dilithium/ref/sign.c ]; then
          echo "ERROR: Dilithium source files missing."
          exit 1
        fi
        if [ ! -f depends/dilithium/ref/Makefile ]; then
          echo "Creating Dilithium Makefile..."
          {
            echo 'CC ?= /usr/bin/cc'
            echo 'CFLAGS += -Wall -Wextra -Wpedantic -Wmissing-prototypes -Wredundant-decls -Wshadow -Wvla -Wpointer-arith -O3 -fomit-frame-pointer'
            echo 'SOURCES = sign.c packing.c polyvec.c poly.c ntt.c reduce.c rounding.c fips202.c symmetric-shake.c randombytes.c'
            echo '.PHONY: all clean'
            echo 'all:'
            printf '\t$(CC) $(CFLAGS) -DDILITHIUM_MODE=3 -c $(SOURCES)\n'
            echo 'clean:'
            printf '\trm -f *.o\n'
          } > depends/dilithium/ref/Makefile
        fi
        cd depends/dilithium/ref
        make clean || true
        make -j$(nproc)

    - name: Build Dilithion (all targets)
      run: |
        make clean
        make -j$(nproc)
        ls -lh dilithion-node dilv-node check-wallet-balance genesis_gen

    - name: Extract version from tag
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="dev"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"

    - name: Create DIL release package
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
      run: |
        chmod +x package-linux-release.sh
        ./package-linux-release.sh
        ls -lh "releases/dilithion-${VERSION}-mainnet-linux-x64.tar.gz"

    - name: Verify bundled libraries
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
      run: |
        # Confirm every dynamic dep is either bundled in lib/ or is a system
        # library expected on every reasonable Linux distro.
        EXTRACT_DIR="releases/dilithion-${VERSION}-mainnet-linux-x64"
        echo "Bundled libraries:"
        ls -lh "${EXTRACT_DIR}/lib/" || { echo "ERROR: lib/ directory missing"; exit 1; }
        echo ""
        echo "ldd output for dilithion-node (note: build host paths; users use bundled libs via run-node.sh):"
        ldd "${EXTRACT_DIR}/dilithion-node"
        echo ""
        # Sanity-check critical libs are present in the bundle.
        for required in libleveldb.so.1d libssl.so.3 libcrypto.so.3 libminiupnpc.so.17 libgmp.so.10 libsnappy.so.1; do
          if [ ! -f "${EXTRACT_DIR}/lib/${required}" ]; then
            echo "ERROR: ${required} missing from bundle"
            exit 1
          fi
        done
        echo "All required libraries bundled."

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dilithion-${{ steps.get_version.outputs.version }}-mainnet-linux-x64
        path: releases/dilithion-${{ steps.get_version.outputs.version }}-mainnet-linux-x64.tar.gz

    - name: Upload to release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: releases/dilithion-${{ steps.get_version.outputs.version }}-mainnet-linux-x64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
